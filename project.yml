name: MC1
options:
  bundleIdPrefix: com.meshcoreone
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: ""

packages:
  MeshCore:
    path: MeshCore
  MC1Services:
    path: MC1Services
  Emojibase:
    url: https://github.com/matrix-org/emojibase-bindings
    from: 1.5.0
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: 6.23.0

targets:
  MC1:
    type: application
    platform: iOS
    sources:
      - path: MC1
        excludes:
          - "**/*.md"
      - path: AppIcon.icon
      - path: Shared
    dependencies:
      - package: MC1Services
      - package: Emojibase
      - package: MapLibre
      - target: MC1Widgets
    preBuildScripts:
      - name: SwiftGen
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftgen &> /dev/null; then
              echo "error: SwiftGen not installed. Install with: brew install swiftgen"
              exit 1
          fi
          swiftgen config run --config "${PROJECT_DIR}/swiftgen.yml"
        inputFiles:
          - $(PROJECT_DIR)/swiftgen.yml
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Localizable.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Chats.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Contacts.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Map.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Settings.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Tools.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/Onboarding.strings
          - $(PROJECT_DIR)/MC1/Resources/Localization/en.lproj/RemoteNodes.strings
        outputFiles:
          - $(PROJECT_DIR)/MC1/Resources/Generated/L10n.swift
        basedOnDependencyAnalysis: false
    settings:
      base:
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 0.11.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        TARGETED_DEVICE_FAMILY: "1,2"
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - bluetooth-central
          - location
        NSBluetoothAlwaysUsageDescription: "MeshCore One uses Bluetooth to maintain connections with MeshCore radios, even in the background, so you can send and receive messages without opening the app."
        NSBluetoothPeripheralUsageDescription: "MeshCore One uses Bluetooth to connect to MeshCore radios."
        NSLocationWhenInUseUsageDescription: "MeshCore One can share your location with contacts on the mesh network."
        NSLocationAlwaysAndWhenInUseUsageDescription: "MeshCore One can share your location with contacts on the mesh network, and track your position during range testing in the background."
        NSLocationAlwaysUsageDescription: "MeshCore One needs always-on location access to track range test beacons even when the app is backgrounded."
        NSAccessorySetupKitSupports:
          - Bluetooth
        NSAccessorySetupBluetoothServices:
          - "6E400001-B5A3-F393-E0A9-E50E24DCCA9E"
        NSAccessorySetupBluetoothNames:
          - "MeshCore-"
          - "Whisper-"
          - "WisCore"
          - "XIAO"
          - "elecrow"
          - "HT-n5262"
          - "Seeed"
          - "BQ"
          - "ProMicro"
          - "Keepteen"
          - "Meshtiny"
          - "T1000-E-BOOT"
          - "me25ls01-BOOT"
          - "NRF52 DK"
      configs:
        Debug:
          INFOPLIST_FILE: MC1/Info-Debug.plist
          PRODUCT_BUNDLE_IDENTIFIER: io.pocketmesh.app.debug
        Release:
          INFOPLIST_FILE: MC1/Info.plist
          PRODUCT_BUNDLE_IDENTIFIER: io.pocketmesh.app

  MC1Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MC1Tests
    dependencies:
      - target: MC1
    settings:
      base:
        INFOPLIST_FILE: MC1Tests/Info.plist
        MARKETING_VERSION: 0.11.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MC1.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MC1"
        BUNDLE_LOADER: "$(TEST_HOST)"

  MC1Widgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MC1Widgets
      - path: Shared
    settings:
      base:
        MARKETING_VERSION: 0.11.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          INFOPLIST_FILE: MC1Widgets/Info.plist
          PRODUCT_BUNDLE_IDENTIFIER: io.pocketmesh.app.debug.widgets
        Release:
          INFOPLIST_FILE: MC1Widgets/Info.plist
          PRODUCT_BUNDLE_IDENTIFIER: io.pocketmesh.app.widgets

schemes:
  MC1:
    build:
      targets:
        MC1: all
        MC1Tests: [test]
        MC1Widgets: [run]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MC1Tests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
